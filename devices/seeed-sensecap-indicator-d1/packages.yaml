# =============================================================================
# COMMUNITY PACKAGE - Seeed SenseCAP Indicator D1
# =============================================================================
# Community-maintained EspControl package for manual ESPHome installs.
# This is not an officially supported EspControl device target.
#
# Notes:
# - Built-in EspControl firmware update checks are disabled because this device
#   is not published in the official release manifest.
# - Shared EspControl UI/config packages are loaded from upstream EspControl.
# - The web UI asset is hosted from this community branch, not upstream.
# - D1S/D1L/D1Pro optional air-quality sensor and LoRa hardware is not exposed.
# =============================================================================

