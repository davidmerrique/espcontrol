esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    version: 5.5.2
    source: https://github.com/pioarduino/esp-idf/releases/download/v5.5.2/esp-idf-v5.5.2.tar.xz
    platform_version: 55.03.37
    sdkconfig_options:
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
      CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM: "8"
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"
      CONFIG_ESPTOOLPY_FLASHSIZE_8MB: "y"
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"

external_components:
  - source:
      type: git
      url: ${espcontrol_component_url}
      ref: ${espcontrol_component_ref}
      path: components
    components: [espcontrol, web_server_idf, artwork_image]
    refresh: 1s

espcontrol:

web_server:
  js_url: https://cdn.jsdelivr.net/gh/davidmerrique/espcontrol@sensecap-d1-community-package/docs/public/webserver/${device_slug}/www.js?v=${firmware_version}

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    build_flags:
      - "-DESPCONTROL_DISABLE_TODO=1"
      - "-DESPCONTROL_MAX_GRID_SLOTS=9"
  on_boot:
    - priority: 800
      then:
        - lambda: |-
            auto reason = esp_reset_reason();
            if (reason == ESP_RST_SW) {
              esp_ota_img_states_t ota_state;
              const esp_partition_t *running = esp_ota_get_running_partition();
              if (running != nullptr &&
                  esp_ota_get_state_partition(running, &ota_state) == ESP_OK &&
                  ota_state == ESP_OTA_IMG_PENDING_VERIFY) {
                ESP_LOGI("s3_reset", "Marking OTA image valid before hardware-reset workaround");
                id(sensecap_d1_safe_mode).mark_successful();
                global_preferences->sync();
                esp_sleep_enable_timer_wakeup(100000);
                esp_deep_sleep_start();
                return;
              }
            }
            if (reason == ESP_RST_USB || reason == ESP_RST_SW) {
              esp_sleep_enable_timer_wakeup(100000);
              esp_deep_sleep_start();
            }
    - priority: 700
      then:
        - logger.log:
            tag: sensecap
            level: INFO
            format: "SenseCAP Indicator D1 community EspControl package booting"
    - priority: -100
      then:
        - lambda: 'id(screen_rotation_ready) = true;'
        - script.execute: apply_screen_rotation

psram:
  mode: octal
  speed: 80MHz

ota:
  - platform: esphome
    on_begin:
      then:
        - script.execute: show_update_writing
        - script.wait: show_update_writing
    on_end:
      then:
        - globals.set:
            id: firmware_update_complete_pending
            value: 'true'
        - lambda: 'global_preferences->sync();'
        - lambda: |-
            esp_sleep_enable_timer_wakeup(100000);
            esp_deep_sleep_start();
    on_error:
      then:
        - script.execute: show_update_failed
  - platform: http_request
    on_begin:
      then:
        - script.execute: show_update_writing
        - script.wait: show_update_writing
    on_end:
      then:
        - globals.set:
            id: firmware_update_complete_pending
            value: 'true'
        - lambda: 'global_preferences->sync();'
        - lambda: |-
            esp_sleep_enable_timer_wakeup(100000);
            esp_deep_sleep_start();
    on_error:
      then:
        - script.execute: show_update_failed

safe_mode:
  id: sensecap_d1_safe_mode
  boot_is_good_after: 10s

api:
  listen_backlog: 4
  max_connections: 3
  max_send_queue: 12

logger:
  hardware_uart: UART0

wifi:
  use_psram: true

output:
  - platform: ledc
    pin:
      number: GPIO45
      ignore_strapping_warning: true
    id: gpio_backlight_pwm
    frequency: 100Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0s
    gamma_correct: 1.0
    on_turn_on:
      then:
        - if:
            condition:
              lambda: |-
                return id(screen_schedule_asleep) ||
                       (id(schedule_enabled).state && !panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now()).is_valid());
            then:
              - script.execute: backlight_force_display_off
            else:
              - if:
                  condition:
                    lambda: 'return id(screensaver_display_off_active);'
                  then:
                    - script.execute: screensaver_wake
    on_turn_off:
      then:
        - if:
            condition:
              lambda: |-
                return !id(display_asleep) &&
                       !id(screen_schedule_asleep) &&
                       !id(screensaver_display_off_active) &&
                       !id(screensaver_dimmed_active);
            then:
              - script.execute: screen_schedule_manual_sleep

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO38
      inverted: true
    name: User Button
    id: user_button
    on_press:
      then:
        - script.execute: screensaver_wake

spi:
  - id: lcd_spi
    clk_pin: GPIO41
    mosi_pin: GPIO48
    miso_pin: GPIO47

i2c:
  - id: bus_a
    sda: GPIO39
    scl: GPIO40
    scan: false

pca9554:
  - id: pca9554a_device
    address: 0x20
    pin_count: 16

touchscreen:
  - platform: ft5x06
    id: my_touchscreen
    update_interval: 16ms
    transform:
      mirror_x: true
      mirror_y: true
    on_release:
      - script.execute: screensaver_wake

display:
  - platform: mipi_rgb
    model: SEEED-INDICATOR-D1
    id: my_display
    setup_priority: 240
    update_interval: never
    auto_clear_enabled: False

lvgl:
  id: main_lvgl
  setup_priority: 230
  buffer_size: 12%
  displays: my_display
  rotation: 180
  touchscreens:
    - touchscreen_id: my_touchscreen
      long_press_time: 3s

script:
  - id: apply_screen_rotation
    then:
      - if:
          condition:
            lambda: 'return id(screen_rotation_select).current_option() == "90";'
          then:
            - lvgl.display.set_rotation: 270
          else:
            - if:
                condition:
                  lambda: 'return id(screen_rotation_select).current_option() == "180";'
                then:
                  - lvgl.display.set_rotation: 0
                else:
                  - if:
                      condition:
                        lambda: 'return id(screen_rotation_select).current_option() == "270";'
                      then:
                        - lvgl.display.set_rotation: 90
                      else:
                        - lvgl.display.set_rotation: 180

select:
  - platform: template
    name: "${entity_screen_rotation}"
    internal: true
    disabled_by_default: true
    id: screen_rotation_select
    entity_category: config
    icon: "mdi:screen-rotation"
    optimistic: true
    restore_value: true
    initial_option: "180"
    options:
      - "0"
      - "90"
      - "180"
      - "270"
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(screen_rotation_ready);'
            then:
              - script.execute: apply_screen_rotation

